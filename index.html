<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0f0e0c">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Меню">
<link rel="manifest" href="manifest.json">
<title>Меню — Флешкарты</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root { --bg: #0f0e0c; --card-bg: #1a1814; --card-front: #1e1c18; --accent: #c9a84c; --accent2: #e8c97a; --text: #f0ead8; --muted: #9a8f78; --tag-bg: #2a261e; --correct: #4caf7d; --wrong: #e05c5c; --border: rgba(201,168,76,0.2); }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: 'Raleway', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; align-items: center; overflow-x: hidden; }
  header { width: 100%; padding: 16px 20px 12px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); background: rgba(15,14,12,0.95); position: sticky; top: 0; z-index: 100; backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
  .logo { font-family: 'Playfair Display', serif; font-size: 1.15rem; color: var(--accent); letter-spacing: 0.04em; }
  .progress-bar-wrap { flex: 1; max-width: 200px; margin: 0 14px; height: 3px; background: var(--tag-bg); border-radius: 2px; overflow: hidden; }
  .progress-bar-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); transition: width 0.4s ease; }
  .progress-label { font-size: 0.72rem; color: var(--muted); min-width: 48px; text-align: right; }
  .tabs { display: flex; gap: 6px; padding: 14px 16px; overflow-x: auto; width: 100%; scrollbar-width: none; }
  .tabs::-webkit-scrollbar { display: none; }
  .tab { padding: 5px 14px; border-radius: 20px; border: 1px solid var(--border); background: var(--tag-bg); color: var(--muted); font-size: 0.72rem; font-weight: 600; text-transform: uppercase; white-space: nowrap; cursor: pointer; }
  .tab.active { background: var(--accent); color: #0f0e0c; border-color: var(--accent); }
  .card-area { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 16px 16px 24px; width: 100%; max-width: 600px; }
  .card-top-row { display: flex; align-items: center; justify-content: space-between; width: 100%; margin-bottom: 14px; }
  .card-counter { font-size: 0.72rem; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; }
  .shuffle-btn { background: none; border: 1px solid var(--border); color: var(--muted); padding: 5px 12px; border-radius: 20px; font-size: 0.68rem; text-transform: uppercase; cursor: pointer; }
  .flip-card { width: 100%; perspective: 1200px; cursor: pointer; }
  .flip-card-inner { position: relative; width: 100%; min-height: 260px; transform-style: preserve-3d; transition: transform 0.5s; }
  .flip-card.flipped .flip-card-inner { transform: rotateY(180deg); }
  .card-face { position: absolute; width: 100%; min-height: 260px; backface-visibility: hidden; border-radius: 16px; padding: 28px 24px; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; border: 1px solid var(--border); }
  .card-front { background: var(--card-front); box-shadow: 0 8px 40px rgba(0,0,0,0.5); }
  .card-back { background: var(--card-bg); transform: rotateY(180deg); text-align: left; align-items: flex-start; }
  .card-category-tag { font-size: 0.62rem; font-weight: 600; text-transform: uppercase; color: var(--accent); border: 1px solid rgba(201,168,76,0.35); padding: 3px 12px; border-radius: 12px; margin-bottom: 16px; }
  .dish-name { font-family: 'Playfair Display', serif; font-size: 1.5rem; line-height: 1.3; margin-bottom: 12px; }
  .ingredients-list { font-size: 0.88rem; line-height: 1.75; font-weight: 300; }
  .card-actions { display: flex; gap: 10px; margin-top: 20px; width: 100%; justify-content: center; }
  .btn { font-family: 'Raleway', sans-serif; font-size: 0.78rem; font-weight: 600; text-transform: uppercase; padding: 12px 24px; border-radius: 10px; border: none; flex: 1; max-width: 180px; }
  .btn-correct { background: rgba(76,175,125,0.15); color: var(--correct); border: 1px solid rgba(76,175,125,0.35); }
  .btn-wrong { background: rgba(224,92,92,0.12); color: var(--wrong); border: 1px solid rgba(224,92,92,0.3); }
  .btn-nav { background: var(--tag-bg); color: var(--muted); border: 1px solid var(--border); }
  .score-row { display: flex; gap: 16px; margin-top: 16px; font-size: 0.75rem; color: var(--muted); }
  .dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; margin-right: 5px; }
</style>
</head>
<body>

<header>
  <div class="logo">Меню</div>
  <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progressFill" style="width:0%"></div></div>
  <span class="progress-label" id="progressLabel">0 / 0</span>
</header>

<div class="tabs" id="tabsRow"></div>

<div class="card-area">
  <div class="card-top-row">
    <span class="card-counter" id="cardCounter"></span>
    <button class="shuffle-btn" onclick="shuffleDeck()">⇄ Перемешать</button>
  </div>

  <div class="flip-card" id="flipCard" onclick="flipCard()">
    <div class="flip-card-inner">
      <div class="card-face card-front">
        <div class="card-category-tag" id="frontTag"></div>
        <div class="dish-name" id="frontName"></div>
        <div style="font-size:0.7rem; color:var(--muted)">нажмите, чтобы открыть состав</div>
      </div>
      <div class="card-face card-back">
        <div style="font-size:0.62rem; color:var(--accent); margin-bottom:10px; text-transform:uppercase">Состав:</div>
        <div class="ingredients-list" id="backIngredients"></div>
        <div id="backWeight" style="margin-top:15px; font-size:0.75rem; color:var(--muted)"></div>
      </div>
    </div>
  </div>

  <div class="card-actions" id="actionButtons" style="display:none;">
    <button class="btn btn-wrong" onclick="markCard(false)">✗ Не знал</button>
    <button class="btn btn-correct" onclick="markCard(true)">✓ Знал</button>
  </div>

  <div class="card-actions" id="navButtons">
    <button class="btn btn-nav" onclick="prevCard()">←</button>
    <button class="btn btn-nav" onclick="nextCard()">→</button>
  </div>

  <div class="score-row">
    <span><div class="dot" style="background:var(--correct)"></div><span id="scoreCorrect">0</span></span>
    <span><div class="dot" style="background:var(--wrong)"></div><span id="scoreWrong">0</span></span>
  </div>
</div>

<script>
const ALL_DISHES = [
  { category: "Завтраки", name: "Каша овсяная с тунцом", ingredients: "Овсяные хлопья, сыр пармезан, масло сливочное, петрушка, яйцо 6 мин, микс трав, тунец консерв.", weight: "425 г" },
  { category: "Завтраки", name: "Каша рисовая с ванилью", ingredients: "Рис, молоко, ваниль, сахар, слив. масло. Подача: банан, клубника", weight: "400 г" },
  { category: "Салаты", name: "Буррата с томатами", ingredients: "Буррата, томаты, руккола, базилик, бальзамический соус", weight: "300 г" },
  { category: "Салаты", name: "Цезарь с курицей", ingredients: "Айсберг, черри, соус цезарь, куриное филе, гренки, пармезан", weight: "300 г" },
  { category: "Супы", name: "Лапша с курицей", ingredients: "Куриный бульон, яичная лапша, курица, лук, морковь, укроп", weight: "400 г" },
  { category: "Паста", name: "Спагетти Карбонара", ingredients: "Спагетти, сливки, говядина х/к, желток, пармезан", weight: "420 г" },
  { category: "Пицца", name: "Маргарита", ingredients: "Тесто, томатный соус, моцарелла, помидоры, орегано", weight: "470 г" }
];

let currentDeck = [...ALL_DISHES];
let currentIndex = 0;
let score = { correct: 0, wrong: 0 };

function init() {
    renderTabs();
    loadCard();
}

function renderTabs() {
    const cats = ["Все", ...new Set(ALL_DISHES.map(d => d.category))];
    document.getElementById('tabsRow').innerHTML = cats.map(c => `<div class="tab ${c==='Все'?'active':''}" onclick="filter('${c}', this)">${c}</div>`).join('');
}

function filter(cat, el) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    currentDeck = cat === "Все" ? [...ALL_DISHES] : ALL_DISHES.filter(d => d.category === cat);
    currentIndex = 0;
    loadCard();
}

function loadCard() {
    const dish = currentDeck[currentIndex];
    document.getElementById('flipCard').classList.remove('flipped');
    document.getElementById('actionButtons').style.display = 'none';
    document.getElementById('navButtons').style.display = 'flex';
    document.getElementById('frontTag').textContent = dish.category;
    document.getElementById('frontName').textContent = dish.name;
    document.getElementById('backIngredients').textContent = dish.ingredients;
    document.getElementById('backWeight').textContent = dish.weight;
    document.getElementById('cardCounter').textContent = (currentIndex + 1) + ' / ' + currentDeck.length;
    updateProgress();
}

function flipCard() {
    document.getElementById('flipCard').classList.toggle('flipped');
    const isFlipped = document.getElementById('flipCard').classList.contains('flipped');
    document.getElementById('actionButtons').style.display = isFlipped ? 'flex' : 'none';
    document.getElementById('navButtons').style.display = isFlipped ? 'none' : 'flex';
}

function markCard(known) {
    if(known) score.correct++; else score.wrong++;
    document.getElementById('scoreCorrect').textContent = score.correct;
    document.getElementById('scoreWrong').textContent = score.wrong;
    if(currentIndex < currentDeck.length - 1) nextCard();
}

function nextCard() { if(currentIndex < currentDeck.length - 1) { currentIndex++; loadCard(); } }
function prevCard() { if(currentIndex > 0) { currentIndex--; loadCard(); } }
function shuffleDeck() { currentDeck.sort(() => Math.random() - 0.5); currentIndex = 0; loadCard(); }
function updateProgress() { document.getElementById('progressFill').style.width = ((currentIndex+1)/currentDeck.length*100)+'%'; document.getElementById('progressLabel').textContent = (currentIndex+1)+' / '+currentDeck.length; }

init();

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
</script>
</body>
</html>
